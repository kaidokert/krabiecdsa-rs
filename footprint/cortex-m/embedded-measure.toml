[profiles.qemu-cortex-m0]
preset = "qemu-cortex-m0"
timeout-seconds = 300

[profiles.qemu-cortex-m3]
preset = "qemu-cortex-m3"
timeout-seconds = 300

[profiles.qemu-cortex-m4]
preset = "qemu-cortex-m4"
timeout-seconds = 300

[profiles.jtrace-f407]
runner = "command"
target = "thumbv7em-none-eabihf"
build-features = ["jtrace-f407"]
executable = "probe-rs"
args = [
  "run",
  "--chip", "STM32F407VGTx",
  "--protocol", "swd",
  "--probe", "1366:1020:001224000224",
  "--non-interactive",
  "--disable-progressbars",
  "--no-location",
  "{artifact}",
]
completion-marker = "EM_OUTCOME"
completion-action = "interrupt"
timeout-seconds = 120
artifact-extension = ""

[[case-sets.ecdsa-verify]]
name = "baseline"
example = "baseline"
features = ["baseline"]
expected-benchmark = "krabiecdsa-footprint"

[[case-sets.ecdsa-verify]]
name = "p256-u8"
example = "ecdsa_verify"
features = ["curve_p256", "limb_u8"]
expected-benchmark = "krabiecdsa-footprint"

[[case-sets.ecdsa-verify]]
name = "p256-u32"
example = "ecdsa_verify"
features = ["curve_p256", "limb_u32"]
expected-benchmark = "krabiecdsa-footprint"

[[case-sets.ecdsa-verify]]
name = "k256-u8"
example = "ecdsa_verify"
features = ["curve_k256", "limb_u8"]
expected-benchmark = "krabiecdsa-footprint"

[[case-sets.ecdsa-verify]]
name = "k256-u32"
example = "ecdsa_verify"
features = ["curve_k256", "limb_u32"]
expected-benchmark = "krabiecdsa-footprint"

[[case-sets.ecdsa-verify]]
name = "p384-u8"
example = "ecdsa_verify"
features = ["curve_p384", "limb_u8"]
expected-benchmark = "krabiecdsa-footprint"

[[case-sets.ecdsa-verify]]
name = "p384-u32"
example = "ecdsa_verify"
features = ["curve_p384", "limb_u32"]
expected-benchmark = "krabiecdsa-footprint"

[campaigns.ecdsa-cortex-m0]
profile = "qemu-cortex-m0"
case-set = "ecdsa-verify"
baseline-case = "baseline"

[campaigns.ecdsa-cortex-m3]
profile = "qemu-cortex-m3"
case-set = "ecdsa-verify"
baseline-case = "baseline"

[campaigns.ecdsa-cortex-m4]
profile = "qemu-cortex-m4"
case-set = "ecdsa-verify"
baseline-case = "baseline"

[campaigns.ecdsa-jtrace-f407]
profile = "jtrace-f407"
case-set = "ecdsa-verify"
baseline-case = "baseline"
