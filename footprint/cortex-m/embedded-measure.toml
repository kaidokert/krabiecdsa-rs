[profiles.qemu-cortex-m0]
preset = "qemu-cortex-m0"
timeout-seconds = 300

[profiles.qemu-cortex-m3]
preset = "qemu-cortex-m3"
timeout-seconds = 300

[profiles.qemu-cortex-m4]
preset = "qemu-cortex-m4"
timeout-seconds = 300

[[case-sets.ecdsa-verify]]
name = "baseline"
example = "baseline"
features = ["baseline"]
expected-benchmark = "krabiecdsa-footprint"

[[case-sets.ecdsa-verify]]
name = "p256-u8"
example = "ecdsa_verify"
features = ["curve_p256", "limb_u8"]
expected-benchmark = "krabiecdsa-footprint"

[[case-sets.ecdsa-verify]]
