name: RISC-V

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  riscv:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: riscv32imac-unknown-none-elf

    - name: Install QEMU
      run: sudo apt-get update && sudo apt-get install -y qemu-system-misc

    - name: Install krabi-caliper host tooling
      run: cargo install krabi-caliper --git https://github.com/kaidokert/krabi-caliper-rs --tag v0.1.0-alpha.4 --features cli,campaign

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: riscv-${{ hashFiles('footprint/risc-v/Cargo.toml', 'ecdsa/Cargo.toml') }}
        restore-keys: riscv-

    - name: Run RISC-V suite
      run: |
        set -o pipefail
        cargo krabi-caliper run ecdsa-riscv32 | tee -a "$GITHUB_STEP_SUMMARY"
      working-directory: footprint/risc-v
