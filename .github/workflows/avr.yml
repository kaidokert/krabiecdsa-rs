name: AVR

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  avr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: nightly-2025-11-01
        components: rust-src

    - name: Install simavr and AVR toolchain
      run: sudo apt-get update && sudo apt-get install -y simavr gcc-avr avr-libc

    - name: Install krabi-caliper host tooling
      run: cargo install krabi-caliper --version 0.1.0 --features cli,campaign

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: avr-${{ hashFiles('footprint/avr/Cargo.toml', 'ecdsa/Cargo.toml') }}
        restore-keys: avr-

    - name: Run AVR suite
      run: |
        set -o pipefail
        cargo krabi-caliper run ecdsa-avr | tee -a "$GITHUB_STEP_SUMMARY"
      working-directory: footprint/avr
