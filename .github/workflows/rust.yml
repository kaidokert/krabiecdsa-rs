name: Rust

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: ecdsa

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - uses: pre-commit/action@v3.0.1

  build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Format check
      run: cargo fmt -- --check
    - name: Clippy
      run: cargo clippy --all-targets -- -D warnings
    - name: Clippy (signing)
      run: cargo clippy --all-targets --features signing -- -D warnings
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Run tests (signing)
      run: cargo test --features signing --verbose
    - name: Build with modmath/zeroize (feature-unification guard)
      run: cargo build -F modmath/zeroize --verbose

  no-std:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [thumbv7m-none-eabi, riscv32imac-unknown-none-elf]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - name: Build no_std
      run: cargo build --target ${{ matrix.target }} --verbose
