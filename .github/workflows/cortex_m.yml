name: Cortex-M

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  cortex-m:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: thumbv6m-none-eabi, thumbv7m-none-eabi, thumbv7em-none-eabi

    - name: Install QEMU
      run: sudo apt-get update && sudo apt-get install -y qemu-system-arm

    - name: Install krabi-caliper host tooling
      run: cargo install krabi-caliper --git https://github.com/kaidokert/krabi-caliper-rs --tag v0.1.0-alpha.3 --features cli,campaign

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: cortex-m-${{ hashFiles('footprint/cortex-m/Cargo.toml', 'ecdsa/Cargo.toml') }}
        restore-keys: cortex-m-

    - name: Run Cortex-M suite
      run: |
        set -o pipefail
        for campaign in ecdsa-cortex-m0 ecdsa-cortex-m3 ecdsa-cortex-m4; do
          cargo krabi-caliper run "$campaign"
        done | tee -a "$GITHUB_STEP_SUMMARY"
      working-directory: footprint/cortex-m
