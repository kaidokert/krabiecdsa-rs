[profiles.jtrace-f407-168mhz]
runner = "command"
target = "thumbv7em-none-eabihf"
build-features = ["clock-168mhz"]
board = "jtrace-reference-board"
mcu = "STM32F407VG"
transport = "rtt"
probe = "1366:1020:001224000224"
clock-frequency-hz = 168000000
executable = "probe-rs"
args = [
  "run",
  "--chip", "STM32F407VGTx",
  "--protocol", "swd",
  "--probe", "1366:1020:001224000224",
  "--non-interactive",
  "--disable-progressbars",
  "--no-location",
  "{artifact}",
]
completion-marker = "EM_SUMMARY"
completion-action = "interrupt"
timeout-seconds = 300
target-dir = "target"
artifact-extension = ""

[[case-sets.krabiecdsa-signing-cyccnt]]
name = "p256-layered-signing"
binary = "krabiecdsa-cyccnt-hardware"
expected-suite = "krabiecdsa-p256-sign"

[campaigns.krabiecdsa-signing-ct-jtrace-f407]
profile = "jtrace-f407-168mhz"
case-set = "krabiecdsa-signing-cyccnt"
